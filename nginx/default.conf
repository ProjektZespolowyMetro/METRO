# Upstream do backendu (Django/gunicorn).
# Nazwa "backend" musi pasować do nazwy serwisu w docker-compose.yml.
upstream backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    # --- Kompresja ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # --- API Django (REST) ---
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- Panel admina Django (opcjonalnie) ---
    location /admin/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Cache długoterminowy dla buildu Reacta ---
    # CRA dorzuca hash do nazw plików w /static/, więc można cache'ować na maksa.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Faviony, manifesty itp.
    location ~* \.(?:ico|webmanifest|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # --- React Router / SPA fallback ---
    # Wszystko, co nie pasuje wyżej, oddajemy index.html (routing po stronie klienta).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Wyłącz logowanie dla healthcheck-ów
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
